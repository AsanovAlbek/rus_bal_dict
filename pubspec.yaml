name: rus_bal_dict
description: "Russian to Balkarian Dictionary App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.3 <4.0.0'
dependencies:
  flutter:
    sdk: flutter
  #ios иконки
  cupertino_icons: ^1.0.6
  #навигация
  go_router: ^17.3.0
  #стейт менеджер
  flutter_bloc: ^9.1.1
  #проигрывание аудио
  audioplayers: 6.1.1
  #инъекция зависимостей (DI)
  get_it: ^9.2.1
  #генерация data классов
  freezed_annotation: ^2.4.1
  #для переопределения сравнивания объектов
  equatable: ^2.0.5
  #локальное хранилище
  shared_preferences: ^2.5.3
  #http запросы
  dio: ^5.4.3+1
  #result api подобный функционал для обработки ошибок
  either_dart: ^1.0.0
  #логирование
  talker: ^5.1.17
  #локальное хранилище (база данных) (в дальнейшем возможно заменить на drift/realm)
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  #интерсептор для кэширования результатов запросов в сеть
  dio_cache_interceptor: ^3.5.0
  #для обращения в файловую систему (пока не нужно, возможно удалю)
  path_provider: ^2.1.3
  #удобные event transformers для flutter_bloc
  bloc_concurrency: ^0.3.0
  #плагин для получения информации об устройстве
  device_info_plus: ^12.4.0
  #шрифты от гугла
  google_fonts: ^8.1.0
  #svg иконки
  flutter_svg: ^2.0.10+1
  #html текст
  flutter_widget_from_html: ^0.17.2
  #набирать код восстановления
  pinput: ^6.0.2
  #работать с временем
  intl: ^0.20.2
  #вебвью
  webview_flutter: ^4.8.0
  # для переходов по ссылкам
  url_launcher: ^6.3.0
  flutter_flavorizr: ^2.2.3
  dio_cache_interceptor_hive_store: ^4.0.0
  # для кэширования запросов
  dio_cache_interceptor_hive_store: ^3.2.2
  # для облегчения написания запросов в сеть
  retrofit: ^4.4.2
  # для безопасного хранения данных
  flutter_secure_storage: 9.2.4
  # проигрывание аудиозаписей
  just_audio: ^0.9.46
  


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.9
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  hive_generator: ^2.0.1
  mocktail: ^1.0.4
  retrofit_generator: ^8.2.1
  dart_style: ^2.3.8

flutter:
  assets:
    - assets/images/
    - assets/images/favorites.svg
    - assets/images/play_audio.svg
    - assets/images/favorites_filled.svg
  uses-material-design: true